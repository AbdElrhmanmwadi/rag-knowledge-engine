services:
  mongodb:
    image: mongo:7-jammy
    
    container_name: mongodb
    
    ports:
      - "27007:27017"
    
    volumes:
      - mongodata:/data/db

    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    
    networks:
      - backend
    
    restart: always
  pgvector:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    
    container_name: pgvector
    
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql
    
    environment:
    
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    
    networks:
      - backend
    
    restart: always
    
  libretranslate:
    
    image: libretranslate/libretranslate:latest
    
    container_name: libretranslate
    user: "0:0"
    restart: always
    ports:
      - "5000:5000"
    command: ["--req-limit", "100"]
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - libretranslate_models:/home/libretranslate/.local/share/argos-translate
    healthcheck:
      test: ['CMD-SHELL', './venv/bin/python scripts/healthcheck.py']
      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - backend


networks:
  backend:


volumes:
  mongodata:
  pgvector_data:
  libretranslate_models:
