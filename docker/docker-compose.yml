services:
  # ===================== Application =====================
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: backend
    env_file:
      - ./env/.env.app
    ports:
      - "8000:8000"
    volumes:
      - rag_storage:/data/rag
    depends_on:
      pgvector:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  frontend:
    # Placeholder web UI. Replace this with your real frontend image/build.
    image: nginx:1.27-alpine
    container_name: frontend
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ../deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
      - grafana
      - prometheus
    networks:
      - backend
    restart: unless-stopped

  # ===================== Databases =====================
  pgvector:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    container_name: pgvector
    env_file:
      - ./env/.env.postgres
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend
    restart: always

  mongodb:
    image: mongo:7-jammy
    container_name: mongodb
    env_file:
      - ./env/.env.mongo
    ports:
      - "27007:27017"
    volumes:
      - mongodata:/data/db
    networks:
      - backend
    restart: always

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - backend
    restart: always

  # ===================== Translation =====================
  libretranslate:
    image: libretranslate/libretranslate:v1.9.4
    container_name: libretranslate
    user: "0:0"
    restart: always
    ports:
      - "5000:5000"
    command: --load-only ar,en --req-limit 100
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - libretranslate_models:/home/libretranslate/.local/share/argos-translate
    healthcheck:
      test:
        - CMD-SHELL
        - ./venv/bin/python -c "from urllib.request import urlopen; import sys; response = urlopen('http://localhost:5000/health', timeout=5); sys.exit(0 if response.status == 200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    networks:
      - backend

  # ===================== Monitoring =====================
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      # Served behind Nginx at /prometheus/ — keep the route prefix in sync.
      - --web.external-url=http://localhost/prometheus/
    ports:
      - "9090:9090"
    networks:
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.1
    container_name: grafana
    env_file:
      - ./env/.env.grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - backend
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: postgres-exporter
    env_file:
      - ./env/.env.postgres-exporter
    ports:
      - "9187:9187"
    depends_on:
      pgvector:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    ports:
      - "9100:9100"
    networks:
      - backend
    restart: unless-stopped


networks:
  backend:
    driver: bridge


volumes:
  mongodata:
  pgvector_data:
  qdrant_data:
  libretranslate_models:
  rag_storage:
  prometheus_data:
  grafana_data:
