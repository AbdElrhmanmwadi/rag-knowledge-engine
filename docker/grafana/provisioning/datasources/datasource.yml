apiVersion: 1

# Auto-provision Prometheus as the default datasource so no manual setup is needed.
datasources:
  - name: Prometheus
    type: prometheus
    # Fixed uid so provisioned dashboards can reference it deterministically.
    uid: prometheus
    access: proxy
    # Prometheus runs behind the /prometheus/ route prefix (--web.external-url), so its
    # API lives at /prometheus/api/... — the datasource URL must include that prefix.
    url: http://prometheus:9090/prometheus
    isDefault: true
    editable: true
